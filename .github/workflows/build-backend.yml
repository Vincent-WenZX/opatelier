name: Build & Push Backend

on:
  push:
    branches: [main]
    paths:
      - 'orchid-plum/**'
      - '.github/workflows/build-backend.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vincent-wenzx/opatelier-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./orchid-plum
          push: true
          tags: |
            ghcr.io/vincent-wenzx/opatelier-backend:latest
            ghcr.io/vincent-wenzx/opatelier-backend:${{ github.sha }}
