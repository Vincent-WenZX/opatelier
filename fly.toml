# fly.toml app configuration file generated for opatelier-red-frost-8074 on 2026-03-04T11:49:49-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'opatelier-red-frost-8074'
primary_region = 'sjc'

[build]
  image = 'ghcr.io/vincent-wenzx/opatelier-backend:latest'

[deploy]
  release_command = 'medusa db:migrate'

[http_service]
  internal_port = 9000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    port = 9000
    type = 'http'
    interval = '15s'
    timeout = '5s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
